<!DOCTYPE html>
<html>
<head>
	<!-- Basic Page Needs
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<meta charset="utf-8">
    <title>Transfusion Simulator admin</title>

	<!-- Mobile Specific Metas
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- FONT
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

	<!-- CSS
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/skeleton.css">
	<link rel="stylesheet" href="css/tabs.css">

	<!-- Favicon
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<link rel="icon" type="image/png" href="images/icons/launchericon-48x48.png">
	<meta charset="UTF-8">
    <meta name="theme-color" content="#33c3f0" />

	<!-- PWA manifest
	–––––––––––––––––––––––––––––––––––––––––––––––––– -->
	<link rel="manifest" href="manifest.json" />

</head>
<body>
<script src="js/app.js"></script>
<div class="container">
	<div class="row">
		<div class="twelve columns" style="margin-top: 5%">
			<h1>Transfusion Simulator</h1>
		</div>
	</div>
	<div class="row">
		<div class="twelve columns" style="margin-top: 5%">
			<div class="tab">
				<button class="tablinks" onclick="openTab(event, 'Connect')" id="defaultOpen">Connect</button>
				<button class="tablinks" onclick="openTab(event, 'Bags')">Bags</button>
				<button class="tablinks" onclick="openTab(event, 'Scenarios')">Scenarios</button>
			</div>
		</div>
	</div>
	<div id="Connect" class="tabcontent">
		<div class="row">
			<div class="four columns">
				<button id="connectBleButton" class="button-primary">Connect</button>
			</div>
			<div class="four columns">
				<button id="disconnectBleButton">Disconnect</button>
			</div>
		</div>
		<div class="row">
			<div class="twelve columns">
				<p>BLE state: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong></p>
			</div>
		</div>
	</div>
	<div id="Bags" class="tabcontent">
		<form>
		<div class="row">
			<div class="three columns" style="margin-top: 5%">
				<label for="bag0">Bag 1</label>
				<select class="u-full-width" id="bag0">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag1">Bag 2</label>
				<select class="u-full-width" id="bag1">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag2">Bag 3</label>
				<select class="u-full-width" id="bag2">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag3">Bag 4</label>
				<select class="u-full-width" id="bag3">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
		</div>
		<div class="row">
			<div class="three columns" style="margin-top: 5%">
				<label for="bag4">Bag 5</label>
				<select class="u-full-width" id="bag4">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag5">Bag 6</label>
				<select class="u-full-width" id="bag5">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag6">Bag 7</label>
				<select class="u-full-width" id="bag6">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
			<div class="three columns" style="margin-top: 5%">
				<label for="bag7">Bag 8</label>
				<select class="u-full-width" id="bag7">
					<option value="0">O-</option>
					<option value="1">O+</option>
					<option value="2">A-</option>
					<option value="3">A+</option>
					<option value="4">B-</option>
					<option value="5">B+</option>
					<option value="6">AB-</option>
					<option value="7">AB+</option>
					<option value="8">Not set</option>
				</select>
			</div>
		</div>
		<div class="row">
			<div class="six columns" style="margin-top: 5%">
				<input class="button-primary" type="submit" value="Update">
			</div>
			<div class="six columns" style="margin-top: 5%">
				<button class="button-primary">Cancel</button>
			</div>
		</div>
		</form>
	</div>
		<div id="Scenarios" class="tabcontent">
			<div class="row">
				<div class="twelve columns">
					<table class="u-full-width">
						<thead>
							<tr>
								<th>Name</th>
								<th colspan="2">Order</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td>Something</td>
								<td>&#8593;</td>
								<td>&#8595;</td>
							</tr>
							<tr>
								<td>Something else</td>
								<td>&#8593;</td>
								<td>&#8595;</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		<form>
		<div class="row">
			<div class="nine columns">
				<label for="scenarioName">Name</label>
				<input class="u-full-width" type="text" placeholder="Name" id="scenarioName">
			</div>
			<div class="three columns">
				<p>This shows up in the scenario list</p>
			</div>
		</div>
		<div class="row">
			<div class="nine columns">
				<label class="available_label">
					<input type="checkbox" id="available">
					<span class="label-body">Shown in list of scenarios</span>
				</label>
			</div>
		</div>
		<div class="row">
			<div class="nine columns">
				<label for="scenarioNarrative">Narrative</label>
				<textarea class="u-full-width" placeholder="Scenario narrative, which is the main thing shown to the player." id="scenarioNarrative"></textarea>
			</div>
			<div class="three columns">
				<p>This shows up in the scenario list</p>
			</div>
		</div>
		<div class="row">
			<div class="nine columns">
				<label class="available_label">
					<input type="checkbox" id="group0">
					<span class="label-body">O-</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group1">
					<span class="label-body">O+</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group2">
					<span class="label-body">A-</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group3">
					<span class="label-body">A+</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group4">
					<span class="label-body">B-</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group5">
					<span class="label-body">B+</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group6">
					<span class="label-body">AB-</span>
				</label>
				<label class="available_label">
					<input type="checkbox" id="group7">
					<span class="label-body">AB+</span>
				</label>
			</div>
			<div class="three columns">
				<p>Blood groups enabled in the scenario</p>
			</div>
		</div>
		<div class="row">
			<div class="six columns" style="margin-top: 5%">
				<input class="button-primary" type="submit" value="Update">
			</div>
			<div class="six columns" style="margin-top: 5%">
				<button class="button-primary">Cancel</button>
			</div>
		</div>
		</div>
		</form>
	</div>
	<div class="row">
		<div class="twelve columns">
			<p>Done in collaboration with the University of Bedfordshire, see the <a href="https://www.hale.ltd/p/transfusion-simulator.html" target="_blank">product page</a> for more</p>
		</div>
	</div>
</div>
</body>
<script src="js/tabs.js"></script>
<script src="js/ble.js"></script>
<script>
// Get the element with id="defaultOpen" and click on it
document.getElementById("defaultOpen").click();
</script></html>
